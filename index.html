<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>opengeiger.de – Interessante Ausflüge (Geiger Caching)</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background-color: #2c7bb6;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: bold;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    header a {
      color: #d4eeff;
      text-decoration: underline;
    }

    #map {
      flex: 1;
    }

    footer {
      background-color: #f5f5f5;
      border-top: 1px solid #ddd;
      padding: 6px 20px;
      font-size: 0.75rem;
      color: #555;
      flex-shrink: 0;
      text-align: center;
    }

    footer a {
      color: #2c7bb6;
    }

    .leaflet-popup-content b {
      display: block;
      margin-bottom: 4px;
      color: #2c7bb6;
    }

    .leaflet-popup-content {
      max-width: 260px;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>🔬 opengeiger.de – Geiger Caching</h1>
      <p>Interessante Ausflüge – Orte mit erhöhter natürlicher Radioaktivität |
        <a href="http://www.opengeiger.de/GeigerCaching/GeigerCaching.html" target="_blank" rel="noopener">opengeiger.de</a>
      </p>
    </div>
  </header>

  <div id="map"></div>

  <footer>
    Datenquelle: <a href="http://www.opengeiger.de" target="_blank" rel="noopener">opengeiger.de</a> –
    Karte: © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs=" crossorigin=""></script>

  <script>
    // Initialize map centered on Germany
    const map = L.map('map').setView([51.0, 10.5], 6);

    // OpenStreetMap tiles
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Custom marker icon
    const radioIcon = L.divIcon({
      html: '☢️',
      className: '',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -14]
    });

    // Load and parse GPX file
    fetch('locations.gpx')
      .then(response => {
        if (!response.ok) throw new Error('GPX file not found');
        return response.text();
      })
      .then(gpxText => {
        const parser = new DOMParser();
        const gpxDoc = parser.parseFromString(gpxText, 'application/xml');

        const ns = 'http://www.topografix.com/GPX/1/1';
        const waypoints = gpxDoc.getElementsByTagNameNS(ns, 'wpt');
        const bounds = [];

        Array.from(waypoints).forEach(wpt => {
          const lat = parseFloat(wpt.getAttribute('lat'));
          const lon = parseFloat(wpt.getAttribute('lon'));
          const name = wpt.getElementsByTagNameNS(ns, 'name')[0]?.textContent || 'Unbekannt';
          const desc = wpt.getElementsByTagNameNS(ns, 'desc')[0]?.textContent || '';

          const marker = L.marker([lat, lon], { icon: radioIcon });
          marker.bindPopup(`<b>${name}</b>${desc ? `<br>${desc}` : ''}`);
          marker.addTo(map);
          bounds.push([lat, lon]);
        });

        if (bounds.length > 0) {
          map.fitBounds(bounds, { padding: [40, 40] });
        }
      })
      .catch(err => {
        console.error('Error loading GPX:', err);
        // Show informational message if GPX cannot be loaded
        const info = L.control({ position: 'topright' });
        info.onAdd = () => {
          const div = L.DomUtil.create('div');
          div.style.cssText = 'background:white;padding:10px;border-radius:4px;border:1px solid #ccc;max-width:240px;font-size:13px;';
          div.innerHTML = '<b>Hinweis:</b> GPX-Datei konnte nicht geladen werden.<br>' +
            'Bitte <a href="http://www.opengeiger.de/GeigerCaching/locations.gpx">locations.gpx</a> ' +
            'von opengeiger.de herunterladen und ins Verzeichnis legen.';
          return div;
        };
        info.addTo(map);
      });
  </script>
</body>
</html>
