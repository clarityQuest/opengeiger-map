function buildSourceUrl(loc) {
  var textTarget = loc.name.replace(/\s+/g, ' ').trim();
  if (loc.anchor) {
    try {
      textTarget = decodeURIComponent(loc.anchor.replace(/\+/g, ' ')).replace(/\s+/g, ' ').trim();
    } catch (e) {
      textTarget = loc.anchor.replace(/\+/g, ' ').replace(/\s+/g, ' ').trim();
    }
  }
  return BASE + '#:~:text=' + encodeURIComponent(textTarget);
}

function buildGoogleMapsUrl(lat, lng) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(lat + ',' + lng);
}

function getColor(d) {
  if (d < 0) return '#999';
  if (d >= 10) return '#A32D2D';
  if (d >= 3)  return '#D85A30';
  if (d >= 1)  return '#EF9F27';
  if (d >= 0.5) return '#639922';
  return '#378ADD';
}
function getTier(d) {
  if (d < 0) return 'NO DATA';
  if (d >= 10) return 'EXTREME';
  if (d >= 3)  return 'VERY HIGH';
  if (d >= 1)  return 'HIGH';
  if (d >= 0.5) return 'ELEVATED';
  return 'LOW';
}

var map = L.map('map').setView([51, 12], 5);
var isLocalFile = window.location.protocol === 'file:';
var osmOptions = {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Data: <a href="http://www.opengeiger.de">opengeiger.de</a>, <a href="https://www.geigerzaehlerforum.de/">geigerzaehlerforum.de</a>',
  maxZoom: 18
};
var voyagerOptions = {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a> | Data: <a href="http://www.opengeiger.de">opengeiger.de</a>, <a href="https://www.geigerzaehlerforum.de/">geigerzaehlerforum.de</a>',
  subdomains: 'abcd',
  maxZoom: 20
};
var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: osmOptions.attribution,
  maxZoom: osmOptions.maxZoom
});
var voyagerLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', voyagerOptions);
var tileErrors = 0;
var fallbackActivated = false;
var userMarker = null;
var userAccuracyCircle = null;

osmLayer.on('tileerror', function() {
  tileErrors += 1;
  if (fallbackActivated || tileErrors < 4) return;
  fallbackActivated = true;
  map.removeLayer(osmLayer);
  voyagerLayer.addTo(map);
  console.warn('OSM tiles blocked locally (403). Switched to CARTO Voyager fallback.');
});

if (isLocalFile) {
  fallbackActivated = true;
  voyagerLayer.addTo(map);
} else {
  osmLayer.addTo(map);
}

function setLocateStatus(text) {
  document.getElementById('locate-status').textContent = text;
}

function showUserPosition(position) {
  var lat = position.coords.latitude;
  var lng = position.coords.longitude;
  var accuracy = position.coords.accuracy || 0;

  if (userMarker) {
    map.removeLayer(userMarker);
  }
  if (userAccuracyCircle) {
    map.removeLayer(userAccuracyCircle);
  }

  userMarker = L.circleMarker([lat, lng], {
    radius: 7,
    fillColor: '#2d6cdf',
    color: '#ffffff',
    weight: 2,
    fillOpacity: 0.95
  }).addTo(map);
  userMarker.bindTooltip('You are here', {direction: 'top'});

  userAccuracyCircle = L.circle([lat, lng], {
    radius: accuracy,
    color: '#2d6cdf',
    fillColor: '#2d6cdf',
    fillOpacity: 0.12,
    weight: 1
  }).addTo(map);

  map.flyTo([lat, lng], 13, {duration: 0.7});
  setLocateStatus('Current position shown');
}

function showUserPositionError(err) {
  if (err && err.code === 1) {
    setLocateStatus('Location permission denied');
    return;
  }
  setLocateStatus('Unable to get current position');
}

document.getElementById('locate-btn').addEventListener('click', function() {
  if (!navigator.geolocation) {
    setLocateStatus('Geolocation is not supported');
    return;
  }

  setLocateStatus('Locating...');
  navigator.geolocation.getCurrentPosition(showUserPosition, showUserPositionError, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 30000
  });
});

var openGeigerLayer = L.layerGroup().addTo(map);
var forumLayer = L.layerGroup().addTo(map);

function showInfo(loc, color, sourceLabel, sourceUrl) {
  document.getElementById('info').style.display = 'block';
  document.getElementById('info-name').textContent = loc.name;
  document.getElementById('info-dose').style.color = color;
  document.getElementById('info-dose').textContent = loc.dose < 0 ? 'No data' : loc.dose + ' \u00b5Sv/h';
  document.getElementById('info-tier').textContent = getTier(loc.dose);
  document.getElementById('info-note').textContent = loc.note || '';
  document.getElementById('info-link').textContent = '\u2192 ' + sourceLabel;
  document.getElementById('info-link').href = sourceUrl;
  document.getElementById('info-gmaps').href = buildGoogleMapsUrl(loc.lat, loc.lng);
}

locations.forEach(function(loc) {
  var color = getColor(loc.dose);
  var r = Math.max(7, Math.min(22, 7 + Math.log10(loc.dose + 1) * 9));
  var marker = L.circleMarker([loc.lat, loc.lng], {
    radius: r,
    fillColor: color,
    color: '#fff',
    weight: 1.5,
    fillOpacity: 0.85
  }).addTo(openGeigerLayer);
  marker.bindTooltip(loc.name, {direction: 'top'});
  marker.on('click', function() {
    showInfo(loc, color, 'opengeiger.de', buildSourceUrl(loc));
  });
});

function makeTriangleIcon(color, size) {
  var s = size || 14;
  var half = s / 2;
  var svg = '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '" xmlns="http://www.w3.org/2000/svg">' +
    '<polygon points="' + half + ',1 ' + (s - 1) + ',' + (s - 1) + ' 1,' + (s - 1) + '" ' +
    'fill="' + color + '" stroke="#fff" stroke-width="1.5" />' +
    '</svg>';
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [s, s],
    iconAnchor: [half, half]
  });
}

forumLocations.forEach(function(loc) {
  var color = getColor(loc.dose);
  var s = loc.dose < 0 ? 12 : Math.max(12, Math.min(26, 12 + Math.log10(loc.dose + 1) * 9));
  var icon = makeTriangleIcon(color, s);
  var marker = L.marker([loc.lat, loc.lng], {icon: icon}).addTo(forumLayer);
  marker.bindTooltip(loc.name, {direction: 'top'});
  marker.on('click', function() {
    showInfo(loc, color, 'Geigerz\u00e4hlerforum', loc.url);
  });
});

document.getElementById('chk-opengeiger').addEventListener('change', function() {
  if (this.checked) map.addLayer(openGeigerLayer);
  else map.removeLayer(openGeigerLayer);
});
document.getElementById('chk-forum').addEventListener('change', function() {
  if (this.checked) map.addLayer(forumLayer);
  else map.removeLayer(forumLayer);
});
</script>
