<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elevated Radiation Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }
  header {
    background: #1a1a2e;
    color: #fff;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
  }
  .header-meta { min-width: 0; }
  .source-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .source-links span {
    color: #88aaff;
    font-size: 13px;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  header a { color: #88aaff; font-size: 13px; text-decoration: none; }
  .locate-btn {
    margin-left: auto;
    border: 0;
    border-radius: 6px;
    background: #2e6ea8;
    color: #fff;
    padding: 6px 9px;
    font-size: 11px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .locate-btn:hover { background: #3b84c5; }
  #locate-status {
    font-size: 11px;
    color: #c6d6ea;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #map { width: 100%; height: 100%; }
  .map-wrap { position: relative; overflow: hidden; flex: 1 1 auto; min-height: 0; }
  #legend-stack {
    position: absolute; bottom: 32px; left: 12px; z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
  }
  #legend {
    background: rgba(255,255,255,0.95); border-radius: 8px;
    padding: 8px 10px; font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    line-height: 1.35;
  }
  #legend strong { display: block; margin-bottom: 4px; font-size: 12px; }
  #legend .legend-row { margin: 2px 0; }
  .legend-sources {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2px;
    margin: 4px 0 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid #ddd;
  }
  .legend-sources label {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    white-space: nowrap;
  }
  .legend-sources input { margin: 0; }
  .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; vertical-align: middle; border: 1.5px solid rgba(255,255,255,0.8); }
  .tri { display: inline-block; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 12px solid #999; margin-right: 6px; vertical-align: middle; }
  .legend-shapes { display: flex; gap: 12px; margin-top: 4px; font-size: 11px; color: #666; border-top: 1px solid #ddd; padding-top: 4px; }
  .legend-shapes span { display: flex; align-items: center; gap: 4px; }
  #info {
    position: absolute; top: 12px; right: 12px; z-index: 1000; width: 280px;
    background: rgba(255,255,255,0.97); border-radius: 8px;
    padding: 14px 16px; font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    display: none; line-height: 1.6;
  }
  #info .close { float: right; cursor: pointer; font-size: 18px; color: #888; line-height: 1; margin-left: 8px; }
  #info .iname { font-weight: 600; font-size: 14px; margin-bottom: 2px; padding-right: 20px; }
  #info .ilocation { font-size: 12px; color: #666; margin-bottom: 6px; }
  #info .dose { font-size: 22px; font-weight: 700; margin: 4px 0 2px; }
  #info .tier { font-size: 12px; color: #555; margin-bottom: 6px; }
  #info .note { font-size: 12px; color: #444; margin-bottom: 10px; }
  #info .src-link {
    display: inline-block; font-size: 12px; padding: 5px 10px;
    background: #1a1a2e; color: #fff; border-radius: 5px;
    text-decoration: none;
  }
  #info .src-link:hover { background: #333; }
  #info .link-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tri-marker { width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; }
  @media (max-width: 480px) {
    header { padding: 8px 8px; gap: 8px; }
    header h1 { font-size: 14px; }
    header a { font-size: 11px; }
    .source-links { gap: 6px; }
    .source-links span { font-size: 11px; }
    .locate-btn { padding: 5px 8px; font-size: 11px; }
    #locate-status { display: none; }
    #legend-stack { bottom: 8px; left: 8px; }
    #legend { padding: 6px 8px; font-size: 10px; max-width: 170px; }
    #legend strong { font-size: 11px; }
    .dot { width: 10px; height: 10px; margin-right: 4px; }
    .tri { border-left-width: 5px; border-right-width: 5px; border-bottom-width: 10px; margin-right: 4px; }
    .legend-shapes { gap: 8px; font-size: 10px; }
    #info { width: 220px; top: 8px; right: 8px; padding: 10px 12px; font-size: 12px; }
    #info .dose { font-size: 18px; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid #ddd;
    border-top-color: #2e6ea8;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  #loading-overlay {
    position: absolute; inset: 0; z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    background: rgba(245,245,245,0.88);
    font-size: 14px; color: #444;
  }
</style>
</head>
<body>
<header>
  <div class="header-meta">
    <h1>&#9762; Elevated Radiation Map</h1>
    <div class="source-links">
      <span>Sources:</span>
      <a href="http://www.opengeiger.de/GeigerCaching/GeigerCaching.html" target="_blank">opengeiger.de</a>
      <a href="https://www.geigerzaehlerforum.de/" target="_blank">geigerzaehlerforum.de</a>
    </div>
  </div>
  <button class="locate-btn" id="locate-btn" type="button">Show my position</button>
  <span id="locate-status">Click a marker for details</span>
</header>

<div class="map-wrap">
  <div id="map"></div>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <span id="loading-msg">Loading data&hellip;</span>
  </div>

  <div id="legend-stack">
    <div id="legend">
      <strong>Sources</strong>
      <div class="legend-sources">
        <label><input type="checkbox" id="chk-opengeiger" checked> opengeiger.de</label>
        <label><input type="checkbox" id="chk-forum" checked> Geigerzählerforum</label>
      </div>
      <strong>Dose rate (&#181;Sv/h)</strong>
      <div class="legend-row"><span class="dot" style="background:#A32D2D"></span> Extreme &ge;10</div>
      <div class="legend-row"><span class="dot" style="background:#D85A30"></span> Very high 3&ndash;10</div>
      <div class="legend-row"><span class="dot" style="background:#EF9F27"></span> High 1&ndash;3</div>
      <div class="legend-row"><span class="dot" style="background:#639922"></span> Elevated 0.5&ndash;1</div>
      <div class="legend-row"><span class="dot" style="background:#378ADD"></span> Low &lt;0.5</div>
      <div class="legend-row"><span class="dot" style="background:#999"></span> No data</div>
      <div class="legend-shapes">
        <span><span class="dot" style="background:#888;width:10px;height:10px"></span> opengeiger</span>
        <span><span class="tri" style="border-bottom-color:#888"></span> Forum</span>
      </div>
    </div>
  </div>

  <div id="info">
    <span class="close" onclick="document.getElementById('info').style.display='none'">&#215;</span>
    <div class="iname" id="info-name"></div>
    <div class="ilocation" id="info-location"></div>
    <div class="dose" id="info-dose"></div>
    <div class="tier" id="info-tier"></div>
    <div class="note" id="info-note"></div>
    <div class="link-row">
      <a class="src-link" id="info-link" href="#" target="_blank">&#8594; Source</a>
      <a class="src-link" id="info-forum-link" href="#" target="_blank" style="display:none">&#8594; Forum</a>
      <a class="src-link" id="info-gmaps" href="#" target="_blank">&#8594; Google Maps</a>
    </div>
  </div>
</div>

<script>
var BASE = 'http://www.opengeiger.de/GeigerCaching/GeigerCaching.html';

function buildSourceUrl(loc) {
  var textTarget = loc.name.replace(/\s+/g, ' ').trim();
  if (loc.anchor) {
    try {
      textTarget = decodeURIComponent(loc.anchor.replace(/\+/g, ' ')).replace(/\s+/g, ' ').trim();
    } catch (e) {
      textTarget = loc.anchor.replace(/\+/g, ' ').replace(/\s+/g, ' ').trim();
    }
  }
  return BASE + '#:~:text=' + encodeURIComponent(textTarget);
}

function buildGoogleMapsUrl(lat, lng) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(lat + ',' + lng);
}


function getColor(d) {
  if (d < 0) return '#999';
  if (d >= 10) return '#A32D2D';
  if (d >= 3)  return '#D85A30';
  if (d >= 1)  return '#EF9F27';
  if (d >= 0.5) return '#639922';
  return '#378ADD';
}
function getTier(d) {
  if (d < 0) return 'NO DATA';
  if (d >= 10) return 'EXTREME';
  if (d >= 3)  return 'VERY HIGH';
  if (d >= 1)  return 'HIGH';
  if (d >= 0.5) return 'ELEVATED';
  return 'LOW';
}

var map = L.map('map').setView([51, 12], 5);
var isLocalFile = window.location.protocol === 'file:';
var osmOptions = {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Data: <a href="http://www.opengeiger.de">opengeiger.de</a>, <a href="https://www.geigerzaehlerforum.de/">geigerzaehlerforum.de</a>',
  maxZoom: 18
};
var voyagerOptions = {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a> | Data: <a href="http://www.opengeiger.de">opengeiger.de</a>, <a href="https://www.geigerzaehlerforum.de/">geigerzaehlerforum.de</a>',
  subdomains: 'abcd',
  maxZoom: 20
};
var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: osmOptions.attribution,
  maxZoom: osmOptions.maxZoom
});
var voyagerLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', voyagerOptions);
var tileErrors = 0;
var fallbackActivated = false;
var userMarker = null;
var userAccuracyCircle = null;

osmLayer.on('tileerror', function() {
  tileErrors += 1;
  if (fallbackActivated || tileErrors < 4) return;
  fallbackActivated = true;
  map.removeLayer(osmLayer);
  voyagerLayer.addTo(map);
  console.warn('OSM tiles blocked locally (403). Switched to CARTO Voyager fallback.');
});

if (isLocalFile) {
  fallbackActivated = true;
  voyagerLayer.addTo(map);
} else {
  osmLayer.addTo(map);
}

function setLocateStatus(text) {
  document.getElementById('locate-status').textContent = text;
}

function showUserPosition(position) {
  var lat = position.coords.latitude;
  var lng = position.coords.longitude;
  var accuracy = position.coords.accuracy || 0;

  if (userMarker) {
    map.removeLayer(userMarker);
  }
  if (userAccuracyCircle) {
    map.removeLayer(userAccuracyCircle);
  }

  userMarker = L.circleMarker([lat, lng], {
    radius: 7,
    fillColor: '#2d6cdf',
    color: '#ffffff',
    weight: 2,
    fillOpacity: 0.95
  }).addTo(map);
  userMarker.bindTooltip('You are here', {direction: 'top'});

  userAccuracyCircle = L.circle([lat, lng], {
    radius: accuracy,
    color: '#2d6cdf',
    fillColor: '#2d6cdf',
    fillOpacity: 0.12,
    weight: 1
  }).addTo(map);

  map.flyTo([lat, lng], 13, {duration: 0.7});
  setLocateStatus('Current position shown');
}

function showUserPositionError(err) {
  if (err && err.code === 1) {
    setLocateStatus('Location permission denied');
    return;
  }
  setLocateStatus('Unable to get current position');
}

document.getElementById('locate-btn').addEventListener('click', function() {
  if (!navigator.geolocation) {
    setLocateStatus('Geolocation is not supported');
    return;
  }

  setLocateStatus('Locating...');
  navigator.geolocation.getCurrentPosition(showUserPosition, showUserPositionError, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 30000
  });
});

var openGeigerLayer = L.layerGroup().addTo(map);
var forumLayer = L.layerGroup().addTo(map);

function showInfo(loc, color, sourceLabel, sourceUrl, forumLoc) {
  document.getElementById('info').style.display = 'block';
  document.getElementById('info-name').textContent = loc.name;
  document.getElementById('info-location').textContent = loc.location || '';
  document.getElementById('info-dose').style.color = color;
  document.getElementById('info-dose').textContent = loc.dose < 0 ? 'No data' : loc.dose + ' \u00b5Sv/h';
  document.getElementById('info-tier').textContent = getTier(loc.dose);
  document.getElementById('info-note').textContent = loc.note || '';
  document.getElementById('info-link').textContent = '\u2192 ' + sourceLabel;
  document.getElementById('info-link').href = sourceUrl;
  document.getElementById('info-gmaps').href = buildGoogleMapsUrl(loc.lat, loc.lng);
  var fl = document.getElementById('info-forum-link');
  if (forumLoc && forumLoc.url) {
    fl.style.display = 'inline-block';
    fl.href = forumLoc.url;
  } else {
    fl.style.display = 'none';
  }
}

var ogMarkers = [];
var forumMarkers = [];

(async function() {
  try {
    var r = await fetch('database.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var db = await r.json();
    var mergeResult = computeMergedPairs(db.opengeiger, db.forum);
    renderOpenGeiger(db.opengeiger, mergeResult);
    renderForum(db.forum, mergeResult);
    document.getElementById('loading-overlay').style.display = 'none';
    adjustOverlappingMarkers();
  } catch(err) {
    document.getElementById('loading-msg').textContent =
      'Failed to load data. Run a local server (VS Code Live Server or python -m http.server). ' + err.message;
  }
})();

function metersBetween(lat1, lng1, lat2, lng2) {
  var dlat = (lat2 - lat1) * 111320;
  var dlng = (lng2 - lng1) * 111320 * Math.cos((lat1 + lat2) / 2 * Math.PI / 180);
  return Math.sqrt(dlat * dlat + dlng * dlng);
}

function computeMergedPairs(ogLocations, forumLocations) {
  var forumSet = new Set();
  var ogMap = new Map();
  ogLocations.forEach(function(og) {
    if (og.hidden) return;
    for (var i = 0; i < forumLocations.length; i++) {
      var f = forumLocations[i];
      if (f.hidden || forumSet.has(f)) continue;
      if (metersBetween(og.lat, og.lng, f.lat, f.lng) <= 150) {
        ogMap.set(og, f);
        forumSet.add(f);
        break;
      }
    }
  });
  return { ogMap: ogMap, forumSet: forumSet };
}

function renderOpenGeiger(locations, mergeResult) {
  var r = markerSizeForZoom(map.getZoom()).r;
  locations.forEach(function(loc) {
    if (loc.hidden) return;
    var color = getColor(loc.dose);
    var mergedForum = mergeResult ? mergeResult.ogMap.get(loc) : null;
    var marker;
    if (mergedForum) {
      marker = L.marker([loc.lat, loc.lng], { icon: makeMergedIcon(color, r) }).addTo(openGeigerLayer);
      marker._mergedColor = color;
    } else {
      marker = L.circleMarker([loc.lat, loc.lng], {
        radius: r, fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.85
      }).addTo(openGeigerLayer);
    }
    marker.bindTooltip(loc.name, {direction: 'top'});
    marker.on('click', function() {
      showInfo(loc, color, 'opengeiger.de', buildSourceUrl(loc), mergedForum);
    });
    ogMarkers.push(marker);
  });
}

function renderForum(locations, mergeResult) {
  var s = markerSizeForZoom(map.getZoom()).s;
  locations.forEach(function(loc) {
    if (loc.hidden) return;
    if (mergeResult && mergeResult.forumSet.has(loc)) return;
    var color = getColor(loc.dose);
    var icon = makeTriangleIcon(color, s);
    var marker = L.marker([loc.lat, loc.lng], {icon: icon}).addTo(forumLayer);
    marker.bindTooltip(loc.name, {direction: 'top'});
    marker.on('click', function() {
      showInfo(loc, color, 'Geigerzählerforum', loc.url);
    });
    marker._triSize = s;
    marker._triColor = color;
    forumMarkers.push(marker);
  });
}

function makeTriangleIcon(color, size) {
  var s = size || 14;
  var half = s / 2;
  var svg = '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '" xmlns="http://www.w3.org/2000/svg">' +
    '<polygon points="' + half + ',1 ' + (s - 1) + ',' + (s - 1) + ' 1,' + (s - 1) + '" ' +
    'fill="' + color + '" stroke="#fff" stroke-width="1.5"/>' +
    '</svg>';
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [s, s],
    iconAnchor: [half, half]
  });
}

function makeMergedIcon(color, r) {
  var pad = 2;
  var s = (r + pad) * 2;
  var cx = r + pad;
  var cy = r + pad;
  var svg = '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '" xmlns="http://www.w3.org/2000/svg">' +
    '<polygon points="' + cx + ',' + pad + ' ' + (s - pad) + ',' + (s - pad) + ' ' + pad + ',' + (s - pad) + '" fill="' + color + '" stroke="#fff" stroke-width="1.5"/>' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + (r - 1) + '" fill="' + color + '" stroke="#fff" stroke-width="1.5"/>' +
    '</svg>';
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [s, s],
    iconAnchor: [cx, cy]
  });
}

function markerSizeForZoom(zoom) {
  // Grows gently with zoom: base at zoom 5, +0.6px per zoom level
  return { r: Math.round(9 + Math.max(0, zoom - 3) * 0.6),
           s: Math.round((14 + Math.max(0, zoom - 3) * 0.9) * 1.25) };
}

function adjustOverlappingMarkers() {
  var zoom = map.getZoom();
  var sz = markerSizeForZoom(zoom);

  // Resize all og markers (circles or merged icons)
  ogMarkers.forEach(function(om) {
    if (om._mergedColor) {
      om.setIcon(makeMergedIcon(om._mergedColor, sz.r));
    } else {
      om.setRadius(sz.r);
    }
  });

  // Resize and re-anchor all triangle markers, then check overlap
  forumMarkers.forEach(function(fm) {
    fm._triSize = sz.s;
  });

  if (zoom < 10) {
    forumMarkers.forEach(function(fm) {
      fm.setIcon(makeTriangleIcon(fm._triColor, fm._triSize));
      fm._shifted = false;
    });
    return;
  }
  forumMarkers.forEach(function(fm) {
    var fp = map.latLngToLayerPoint(fm.getLatLng());
    var dominated = false;
    for (var i = 0; i < ogMarkers.length; i++) {
      var op = map.latLngToLayerPoint(ogMarkers[i].getLatLng());
      var dx = fp.x - op.x, dy = fp.y - op.y;
      if (Math.sqrt(dx * dx + dy * dy) < 20) {
        dominated = true;
        break;
      }
    }
    var s = fm._triSize;
    var half = s / 2;
    if (dominated) {
      fm.setIcon(L.divIcon({
        html: makeTriangleIcon(fm._triColor, s).options.html,
        className: '',
        iconSize: [s, s],
        iconAnchor: [half + s, half]
      }));
      fm._shifted = true;
    } else {
      fm.setIcon(makeTriangleIcon(fm._triColor, s));
      fm._shifted = false;
    }
  });
}

map.on('zoomend', adjustOverlappingMarkers);

document.getElementById('chk-opengeiger').addEventListener('change', function() {
  if (this.checked) map.addLayer(openGeigerLayer);
  else map.removeLayer(openGeigerLayer);
});
document.getElementById('chk-forum').addEventListener('change', function() {
  if (this.checked) map.addLayer(forumLayer);
  else map.removeLayer(forumLayer);
});
</script>
</body>
</html>
